# Development override — no Traefik, just app + db
services:
  db:
    image: postgres:16-alpine
    container_name: kag-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: kag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_dev:
