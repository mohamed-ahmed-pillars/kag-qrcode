<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Background circle -->
  <circle cx="250" cy="250" r="250" fill="#f97316"/>

  <!-- Outer ring -->
  <circle cx="250" cy="250" r="230" fill="none" stroke="#ffffff" stroke-width="6"/>

  <!-- Inner decorative ring -->
  <circle cx="250" cy="250" r="200" fill="none" stroke="#ffffff" stroke-width="3" stroke-dasharray="8 6"/>

  <!-- Fork icon (left) -->
  <g fill="#ffffff" transform="translate(140, 155)">
    <rect x="8"  y="0"  width="8" height="70" rx="4"/>
    <rect x="28" y="0"  width="8" height="70" rx="4"/>
    <rect x="48" y="0"  width="8" height="70" rx="4"/>
    <rect x="8"  y="70" width="48" height="8" rx="4"/>
    <rect x="28" y="78" width="8"  height="60" rx="4"/>
  </g>

  <!-- Knife icon (right) -->
  <g fill="#ffffff" transform="translate(320, 155)">
    <path d="M20 0 C 20 0, 40 30, 40 60 L 40 70 L 0 70 L 0 60 C 0 30, 20 0, 20 0Z"/>
    <rect x="16" y="70" width="8" height="70" rx="4"/>
  </g>

  <!-- Brand name arc (top) -->
  <path id="topArc" d="M 80,250 A 170,170 0 0,1 420,250" fill="none"/>
  <text font-family="'Arial', sans-serif" font-size="30" font-weight="800" fill="#ffffff" letter-spacing="4">
    <textPath href="#topArc" startOffset="8%">CITYFIRST FOODS</textPath>
  </text>

  <!-- Brand name arc (bottom) -->
  <path id="bottomArc" d="M 90,260 A 160,160 0 0,0 410,260" fill="none"/>
  <text font-family="'Arial', sans-serif" font-size="20" font-weight="600" fill="#ffffff" letter-spacing="6" opacity="0.9">
    <textPath href="#bottomArc" startOffset="15%">EST. 2020</textPath>
  </text>

  <!-- Star decorations -->
  <g fill="#ffffff" opacity="0.7">
    <polygon points="250,105 255,120 270,120 258,129 263,144 250,135 237,144 242,129 230,120 245,120" transform="scale(0.7) translate(107, 80)"/>
    <polygon points="250,105 255,120 270,120 258,129 263,144 250,135 237,144 242,129 230,120 245,120" transform="scale(0.5) translate(270, 140)"/>
    <polygon points="250,105 255,120 270,120 258,129 263,144 250,135 237,144 242,129 230,120 245,120" transform="scale(0.5) translate(-55, 140)"/>
  </g>
</svg>
